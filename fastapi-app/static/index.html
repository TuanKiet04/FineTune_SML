<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Chatbot - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .auth-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .auth-section.hidden {
            display: none;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .tab-buttons button.active {
            background: #667eea;
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .news-section, .chat-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .news-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .news-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .news-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .news-item h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333;
        }
        
        .news-item .meta {
            font-size: 0.85rem;
            color: #666;
        }
        
        .chat-box {
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .message.bot {
            background: white;
            border: 2px solid #e0e0e0;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input-container input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .chat-input-container button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .chat-input-container button:hover {
            background: #5568d3;
        }
        
        .user-info {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .logout-btn {
            padding: 8px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .error {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗞️ News Chatbot</h1>
            <p>Hệ thống đọc tin tức và chat với AI</p>
        </div>

        <!-- AUTH SECTION -->
        <div id="authSection" class="auth-section">
            <div class="tab-buttons">
                <button id="loginTab" class="active" onclick="showTab('login')">Đăng nhập</button>
                <button id="registerTab" onclick="showTab('register')">Đăng ký</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Nhập username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Nhập password">
                </div>
                <div id="loginError" class="error"></div>
                <button class="btn btn-primary" onclick="login()">Đăng nhập</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" placeholder="Chọn username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="Nhập email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Chọn password">
                </div>
                <div id="registerError" class="error"></div>
                <button class="btn btn-primary" onclick="register()">Đăng ký</button>
            </div>
        </div>

        <!-- USER INFO (hidden initially) -->
        <div id="userInfo" class="user-info" style="display: none;">
            <span>Xin chào, <strong id="currentUsername"></strong>!</span>
            <button class="logout-btn" onclick="logout()">Đăng xuất</button>
        </div>

        <!-- MAIN CONTENT -->
        <div id="mainContent" class="main-content" style="display: none;">
            <!-- NEWS SECTION -->
            <div class="news-section">
                <h2 class="section-title">📰 Tin tức mới nhất</h2>
                <div class="news-list" id="newsList">
                    <p style="text-align: center; color: #666;">Đang tải tin tức...</p>
                </div>
            </div>

            <!-- CHAT SECTION -->
            <div class="chat-section">
                <h2 class="section-title">💬 Chat với AI</h2>
                <div class="chat-box" id="chatBox">
                    <div class="message bot">
                        Xin chào! Tôi có thể giúp bạn tìm hiểu về các tin tức. Hãy hỏi tôi bất cứ điều gì!
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" placeholder="Hỏi về tin tức..." onkeypress="handleChatEnter(event)">
                    <button onclick="sendMessage()">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        let authToken = localStorage.getItem('authToken');
        let currentUser = null;

        // Initialize
        if (authToken) {
            checkAuth();
        }

        function showTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerTab').classList.add('active');
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');

            errorDiv.textContent = '';

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (response.ok) {
                    alert('Đăng ký thành công! Vui lòng đăng nhập.');
                    showTab('login');
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.detail;
                }
            } catch (error) {
                errorDiv.textContent = 'Lỗi kết nối server';
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            errorDiv.textContent = '';

            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch(`${API_BASE_URL}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    localStorage.setItem('authToken', authToken);
                    checkAuth();
                } else {
                    errorDiv.textContent = 'Username hoặc password không đúng';
                }
            } catch (error) {
                errorDiv.textContent = 'Lỗi kết nối server';
            }
        }

        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('mainContent').style.display = 'grid';
                    document.getElementById('currentUsername').textContent = currentUser.username;
                    loadNews();
                } else {
                    logout();
                }
            } catch (error) {
                logout();
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        async function loadNews() {
            const newsList = document.getElementById('newsList');
            
            try {
                const response = await fetch(`${API_BASE_URL}/news?limit=20`);
                
                if (response.ok) {
                    const news = await response.json();
                    newsList.innerHTML = news.map(article => `
                        <div class="news-item" onclick="showNewsDetail(${article.id})">
                            <h3>${article.title}</h3>
                            <div class="meta">
                                ${article.topic || 'Chưa phân loại'} • 
                                ${new Date(article.published_at).toLocaleDateString('vi-VN')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    newsList.innerHTML = '<p style="color: red;">Lỗi khi tải tin tức</p>';
                }
            } catch (error) {
                newsList.innerHTML = '<p style="color: red;">Không thể kết nối server</p>';
            }
        }

        function showNewsDetail(id) {
            alert(`Chi tiết bài báo ID: ${id}\n(Bạn có thể mở modal hoặc page mới)`);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            
            if (!question) return;

            const chatBox = document.getElementById('chatBox');
            
            // Show user message
            chatBox.innerHTML += `<div class="message user">${question}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Show loading
            chatBox.innerHTML += `<div class="message bot" id="loading">Đang suy nghĩ...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ question, context_limit: 5 })
                });

                document.getElementById('loading').remove();

                if (response.ok) {
                    const data = await response.json();
                    chatBox.innerHTML += `<div class="message bot">${data.answer}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot">Xin lỗi, có lỗi xảy ra.</div>`;
                }
            } catch (error) {
                document.getElementById('loading').remove();
                chatBox.innerHTML += `<div class="message bot">Lỗi kết nối server</div>`;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleChatEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
