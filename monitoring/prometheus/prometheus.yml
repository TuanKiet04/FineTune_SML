global:
  scrape_interval: 10s

scrape_configs:  
  - job_name: 'n8n'
    #metrics_path: /metrics
    static_configs:
      - targets: ['n8n:5678']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq_exporter:9419']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
