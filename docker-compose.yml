services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_ENABLE_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_METRICS_INCLUDE_QUEUE_METRICS=true
      - N8N_BASIC_AUTH_USER=kietcorn
      - N8N_BASIC_AUTH_PASSWORD=kiietqo9204
      - TZ=Asia/Ho_Chi_Minh
      - N8N_HOST=0.0.0.0         # Lắng nghe mọi IP trong Docker
      - N8N_PORT=5678            # OK, không bắt buộc nhưng hợp lý
      - N8N_PROTOCOL=http        # OK
      - WEBHOOK_URL=https://99f7d50ed714.ngrok-free.app # Rất tốt nếu dùng webhook
      - N8N_RUNNERS_ENABLED=true
      - N8N_SECURE_COOKIE=false
    volumes:
      - my-n8n-data-example:/home/node/.n8n
    networks:
      - kietcorn-network
    restart: always

  postgres:
    image: ankane/pgvector       # Hỗ trợ pgvector để dùng cho RAG
    container_name: postgres
    #hostname: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kietcorn-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - kietcorn-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"  # Dùng port 11435 để tránh xung đột với Ollama host
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - kietcorn-network
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  
  streamlit:
    build: ./streamlit-app
    container_name: streamlit
    ports:
      - "8501:8501"
    depends_on:
      - postgres
    environment:
      - PG_USER=${PG_USER}
      - PG_PASS=${PG_PASS}
    volumes:
      - ./streamlit-app:/app
    networks:
      - kietcorn-network
    restart: always

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    ports:
      - "3001:3001"   # Mở web UI tại http://localhost:3001
    cap_add:
      - SYS_ADMIN
    volumes:
      - anythingllm_data:/app/server/storage  # lưu dữ liệu local
    env_file:
      - .env
    networks:
      - kietcorn-network
    depends_on:
      - ollama
      - postgres
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    ports:
      - "8088:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: 
      - "http"
      - "n8n:5678"
    networks:
      - kietcorn-network
    depends_on:
      - n8n
    restart: always

  redis:
    image: redis:7-alpine 
    container_name: redis 
    #hostname: redis 
    ports: 
      - "6379:6379" 
    volumes: 
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS}
    networks:
      - kietcorn-network 
    restart: always
    deploy: 
      resources:
       limits:
        memory: 512M

  redis-insight: 
    image: redislabs/redisinsight:latest 
    container_name: redis-insight 
    depends_on: 
      - redis 
    ports: 
      - "5540:5540" 
    volumes: 
      - redis_insight_data:/db 
    networks: 
      - kietcorn-network 
    restart: always 
    deploy:
     resources:
      limits:
       memory: 256M
       
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - kietcorn-network
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"
    networks:
      - kietcorn-network
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/:/etc/grafana/provisioning/
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - kietcorn-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis_exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter
    command: --redis.addr=redis:6379
    ports:
      - "9121:9121"
    networks:
      - kietcorn-network
    
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${PG_USER}:${PG_PASS}@postgres:5432/${PG_DB}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - kietcorn-network
      
  rabbitmq_exporter:
    image: kbudde/rabbitmq-exporter
    container_name: rabbitmq_exporter
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${RABBITMQ_USER}
      RABBIT_PASSWORD: ${RABBITMQ_PASS}
    ports:
      - "9419:9419"
    depends_on:
      - rabbitmq
    networks:
      - kietcorn-network
  
  node_exporter:
    image: prom/node-exporter
    container_name: node_exporter
    ports:
      - "9100:9100"
    networks:
      - kietcorn-network
    restart: unless-stopped

  fastapi:
    build: ./fastapi-app
    ports:
      - "8092:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASS}@postgres:5432/optimize
    depends_on:
      - postgres
    restart: always
    networks:
      - kietcorn-network


volumes:
  my-n8n-data-example:
    external: true
  postgres_data:
  redis_data:
  redis_insight_data:
  pgadmin_data:
  ollama_data:
  crawl4ai_app:
  anythingllm_data:
  ngrok_data:
  appsmith_stacks:
  rabbitmq_data:
  rabbitmq_logs:
  prometheus_data:
  grafana_data:


networks:
  kietcorn-network:
    driver: bridge
    name: kietcorn-network